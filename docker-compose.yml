version: '3.8'

services:
  backend:
    build: ./backend
    container_name: docker-manager-backend
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - metrics-history:/tmp  # Persistir histórico de métricas
      # Montar filesystem del host para métricas reales
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/host/etc/hostname:ro
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - docker-manager-network
    # Modo privilegiado necesario para reiniciar el sistema host
    privileged: true

  frontend:
    build: ./frontend
    container_name: docker-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - docker-manager-network

networks:
  docker-manager-network:
    driver: bridge

volumes:
  metrics-history:  # Volumen para persistir histórico de métricas entre reinicios
