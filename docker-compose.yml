version: '3.8'

services:
  backend:
    build: ./backend
    container_name: docker-manager-backend
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sbin/reboot:/sbin/reboot:ro
      - /sbin/shutdown:/sbin/shutdown:ro
      - metrics-history:/tmp  # Persistir histórico de métricas
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - docker-manager-network
    # Opción 1: Modo privilegiado (más simple pero menos seguro)
    privileged: true

  frontend:
    build: ./frontend
    container_name: docker-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - docker-manager-network

networks:
  docker-manager-network:
    driver: bridge

volumes:
  metrics-history:  # Volumen para persistir histórico de métricas entre reinicios
